{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <h2>Edit Job</h2>
    <form method="POST" action="{{ url_for('jobs.edit_job', job_id=job.id) }}" class="mt-4">
        <div class="mb-3">
            <label for="company" class="form-label">Company</label>
            <input type="text" class="form-control" id="company" name="company" value="{{ job.company }}" required>
        </div>
        <div class="mb-3">
            <label for="position" class="form-label">Position</label>
            <input type="text" class="form-control" id="position" name="position" value="{{ job.position }}" required>
        </div>
        <div class="mb-3">
            <label for="status" class="form-label">Status</label>
            <select class="form-select" id="status" name="status">
                <option value="Applied" {% if job.status == 'Applied' %}selected{% endif %}>Applied</option>
                <option value="Interview" {% if job.status == 'Interview' %}selected{% endif %}>Interview</option>
                <option value="Offered" {% if job.status == 'Offered' %}selected{% endif %}>Offered</option>
                <option value="Rejected" {% if job.status == 'Rejected' %}selected{% endif %}>Rejected</option>
            </select>
        </div>
        <div class="mb-3">
            <label for="applied_date" class="form-label">Applied Date</label>
            <input type="date" class="form-control" id="applied_date" name="applied_date" value="{{ job.applied_date }}" required>
        </div>
        <div class="mb-3">
            <label for="follow_up_date" class="form-label">Follow-up Date</label>
            <input type="date" class="form-control" id="follow_up_date" name="follow_up_date" value="{{ job.follow_up_date or '' }}">
        </div>
        <div class="mb-3">
            <label for="notes" class="form-label">Notes</label>
            <textarea class="form-control" id="notes" name="notes" rows="3">{{ job.notes or '' }}</textarea>
        </div>
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="{{ url_for('jobs.list_jobs') }}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
