{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <h2>Add New Job</h2>
    <form method="POST" action="{{ url_for('jobs.add_job') }}" class="mt-4">
        <div class="mb-3">
            <label for="company" class="form-label">Company</label>
            <input type="text" class="form-control" id="company" name="company" required>
        </div>
        <div class="mb-3">
            <label for="position" class="form-label">Position</label>
            <input type="text" class="form-control" id="position" name="position" required>
        </div>
        <div class="mb-3">
            <label for="status" class="form-label">Status</label>
            <select class="form-select" id="status" name="status">
                <option value="Applied">Applied</option>
                <option value="Interview">Interview</option>
                <option value="Offered">Offered</option>
                <option value="Rejected">Rejected</option>
            </select>
        </div>
        <div class="mb-3">
            <label for="applied_date" class="form-label">Applied Date</label>
            <input type="date" class="form-control" id="applied_date" name="applied_date" required>
        </div>
        <div class="mb-3">
            <label for="follow_up_date" class="form-label">Follow-up Date</label>
            <input type="date" class="form-control" id="follow_up_date" name="follow_up_date">
        </div>
        <div class="mb-3">
            <label for="notes" class="form-label">Notes</label>
            <textarea class="form-control" id="notes" name="notes" rows="3"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Save Job</button>
        <a href="{{ url_for('jobs.list_jobs') }}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
